<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zug-Ansagen System</title>
  <style>
    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background-color: #333;
      color: #fff;
      text-align: center;
      padding: 10px 0;
      font-size: 0.9em;
      box-shadow: 0px -2px 5px rgba(0, 0, 0, 0.2);
    }


    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      color: #333;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    h1 {
      background-color: #333;
      color: #fff;
      padding: 20px;
      margin: 0;
      font-size: 2.5em;
    }

    h2 {
      margin-top: 30px;
      font-size: 1.8em;
      color: #444;
    }

    button {
      padding: 15px 30px;
      margin: 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background-color: #4CAF50;
      color: #fff;
      cursor: pointer;
      transition: background-color 0.3s;
      width: 80%;
      max-width: 350px;
    }

    button:hover {
      background-color: #45a049;
    }

    .container {
      padding: 30px;
      max-width: 900px;
      margin: 0 auto;
      background-color: #fff;
      box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      margin-top: 30px;
    }

    .back-button {
      margin-top: 30px;
      padding: 12px 25px;
      background-color: #777;
      border-radius: 8px;
      color: white;
      font-size: 18px;
      border: none;
      cursor: pointer;
    }

    .back-button:hover {
      background-color: #666;
    }
  </style>
</head>
<footer>
 &copy; 2025 Leonard Klinger – Alle Rechte vorbehalten.
</footer>
<body>

  <h1>🎤 Zug-Ansagen System</h1>
  
  <!-- Hauptbildschirm -->
<div id="main-menu" class="container">
  <button onclick="showInfo()">Informations-Ansagen</button>
  <button onclick="showS31()">S31 (AVG) Ansagen</button>
  <button onclick="showS32()" style="background-color: #FF9800; cursor: not-allowed;">
    🚧 S32 (AVG) Ansagen 🚧(Im Bau)
  </button>
</div>

<!-- S32 Ansagen (Im Bau) -->
<div id="s32" class="container" style="display:none; background-color:#FF9800; color:#fff; text-align:center;">
  <h2>🚧S32 (AVG) Ansagen🚧</h2>
  <p>Im Bau - noch nicht verfügbar</p>
  <p>Seite neu laden zum verschwinden dieses Banners!</p>
  <button class="back-button" onclick="backToMenu()">← Zurück zum Hauptbildschirm</button>
</div>

  <!-- Informations Ansagen -->
  <div id="info" class="container" style="display:none;">
    <h2>Wählen Sie eine Ansage:</h2>
    <button onclick="playAnsage('Verspätung 5')">Verspätung 5 Minuten</button>
    <button onclick="playAnsage('Verspätung 10')">Verspätung 10 Minuten</button>
    <button onclick="playAnsage('Verspätung 15')">Verspätung 15 Minuten</button>
    <button onclick="playAnsage('Verspätung 20')">Verspätung 20 Minuten</button>
    <button onclick="playAnsage('Ärztlicher Notfall')">Ärztlicher Notfall</button>
    <button onclick="playAnsage('Baustelle - Fahrtende')">Baustelle - Fahrtende</button>
    <button onclick="playAnsage('Begrüßung')">Begrüßung</button>
    <button onclick="playAnsage('Fahrtausfall')">Fahrtausfall</button>
    <button onclick="playAnsage('Fahrtende (Normal)')">Fahrtende (Normal)</button>
    <button onclick="playAnsage('Fahrzeugstörung - Verzögerung')">Fahrzeugstörung - Verzögerung</button>
    <button onclick="playAnsage('Gegenzug')">Gegenzug</button>
    <button onclick="playAnsage('Hinterer Zugteil endet')">Hinterer Zugteil endet</button>
    <button onclick="playAnsage('Notbremse')">Notbremse</button>
    <button onclick="playAnsage('Störung - Verzögerung')">Störung - Verzögerung</button>
    <button onclick="playAnsage('Streckenabschnitt durch Zug belegt')">Streckenabschnitt durch Zug belegt</button>
    <button onclick="playAnsage('Streckensperrung - Fahrtende')">Streckensperrung - Fahrtende</button>
    <button onclick="playAnsage('Türstörung - Verzögerung')">Türstörung - Verzögerung</button>
    <button onclick="playAnsage('Überholung')">Überholung</button>
    <button onclick="playAnsage('Unfall - Fahrtende')">Unfall - Fahrtende</button>
    <button onclick="playAnsage('Unfall - weiter SEV')">Unfall - weiter SEV</button>
    <button onclick="playAnsage('Vorderer Zugteil endet')">Vorderer Zugteil endet</button>
    <button onclick="playAnsage('Warten auf anderen Zug')">Warten auf anderen Zug</button>
    <button class="back-button" onclick="backToMenu()">← Zurück zum Hauptbildschirm</button>
  </div>

  <!-- S31 Ansagen -->
  <div id="s31" class="container" style="display:none;">
    <h2>Wählen Sie eine S31 Ansage:</h2>
    <button onclick="playAnsage('Begrüßung')">Begrüßung</button>
    <button onclick="playAnsage('Odenheim (Fahrtende)')">Odenheim (Fahrtende)</button>
    <button onclick="playAnsage('Odenheim West (Bedarf)')">Odenheim West (Bedarf)</button>
    <button onclick="playAnsage('Zeutern Ost (Bedarf)')">Zeutern Ost (Bedarf)</button>
    <button onclick="playAnsage('Zeutern')">Zeutern</button>
    <button onclick="playAnsage('Zeutern Sportplatz (Bedarf)')">Zeutern Sportplatz (Bedarf)</button>
    <button onclick="playAnsage('Stettfeld')">Stettfeld</button>
    <button onclick="playAnsage('Ubstadt Uhlandstraße')">Ubstadt Uhlandstraße</button>
    <button onclick="playAnsage('Ubstadt Ort')">Ubstadt Ort</button>
    <button onclick="playAnsage('Bruchsal Stegwiesen (Bedarf)')">Bruchsal Stegwiesen (Bedarf)</button>
    <button onclick="playAnsage('Bruchsal Schlossgarten (Bedarf)')">Bruchsal Schlossgarten (Bedarf)</button>
    <button onclick="playAnsage('Bruchsal Bf')">Bruchsal Bahnhof</button>
    <button onclick="playAnsage('Bruchsal GBZ (Bedarf)')">Bruchsal GBZ (Bedarf)</button>
    <button onclick="playAnsage('Untergrombach')">Untergrombach</button>
    <button onclick="playAnsage('Weingarten (Baden)')">Weingarten (Baden)</button>
    <button onclick="playAnsage('Karlsruhe-Durlach')">Karlsruhe-Durlach</button>
    <button onclick="playAnsage('Karlsruhe Hbf (Fahrtende)')">Karlsruhe Hbf (Fahrtende)</button>
    <button class="back-button" onclick="backToMenu()">← Zurück zum Hauptbildschirm</button>
  </div>

  <!-- Audio Elemente -->
  <audio id="gong" src="./avg-gong.mp3"></audio>
  <audio id="audio"></audio>

  <script>
    // Browser-Blockierung umgehen: Erstklick aktiviert Audio
    document.body.addEventListener("click", () => {
      const gong = document.getElementById("gong");
      gong.play().then(() => gong.pause());
    }, { once: true });

    function playAnsage(datei) {
      const gong = document.getElementById("gong");
      const audio = document.getElementById("audio");

      // Erst Gong abspielen
      gong.currentTime = 0;
      gong.play().then(() => {
        gong.onended = () => {
          audio.src = "./" + datei + ".mp3";
          audio.play().catch(err => console.log("Fehler beim Abspielen:", err));
        };
      }).catch(err => console.log("Fehler beim Gong:", err));
    }

    function showS32() {
  document.getElementById("main-menu").style.display = "none";
  document.getElementById("s31").style.display = "none";
  document.getElementById("info").style.display = "none";
  document.getElementById("s32").style.display = "block";
}

    function showS31() {
      document.getElementById("main-menu").style.display = "none";
      document.getElementById("s31").style.display = "block";
      document.getElementById("info").style.display = "none";
    }

    function backToMenu() {
      document.getElementById("main-menu").style.display = "block";
      document.getElementById("info").style.display = "none";
      document.getElementById("s31").style.display = "none";
    }
  </script>

</body>
</html>
